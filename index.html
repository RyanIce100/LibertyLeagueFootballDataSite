<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liberty League Football Database</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
</head>
<body>

<div class="app-layout">

    <!-- ===== SIDE PANEL ===== -->
    <aside class="side-panel" id="sidePanel">
        <div class="side-panel-inner">
            <div class="side-section">
                <div class="side-section-title">Columns</div>
                <div id="categoryPanel" class="category-panel"></div>
            </div>

            <div class="side-section">
                <div class="side-section-title">
                    Filters
                    <span id="activeFilterBadge" class="filter-badge" style="display:none"></span>
                </div>
                <div id="filterContainer"></div>
                <div class="filter-actions">
                    <button id="applyFiltersBtn" class="btn-sm">Apply</button>
                    <button id="clearFiltersBtn" class="btn-sm btn-ghost">Clear</button>
                    <button id="addFilterRowBtn" class="btn-sm btn-ghost">+ Add</button>
                </div>
                <div id="filterStatus" class="filter-status"></div>
            </div>

            <div class="side-section">
                <div class="side-section-title">Computed Column</div>
                <div class="comp-fields">
                    <input id="compName" placeholder="Column name (e.g. YdsPerGame)" />
                    <input id="compFormula" placeholder="Formula (e.g. Rush.Yds / GP)" />
                    <input id="compCondition" placeholder="Condition (optional)" />
                    <button id="addCompColBtn" class="btn-sm btn-green">Add Column</button>
                </div>
                <small class="hint">Use exact CSV column names in formula.</small>
            </div>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

        <!-- Header -->
        <div class="top-header">
            <div class="top-header-left">
                <button class="panel-toggle" id="panelToggleBtn" title="Toggle side panel">☰</button>
                <h1>🏈 Liberty League Football</h1>
                <span class="subtitle">6,000+ rows · 55 columns</span>
            </div>
        </div>

        <!-- Chart Section (collapsible) -->
        <div class="collapsible-block" id="chartBlock">
            <button class="collapsible-header" id="chartToggleBtn">
                <span>📊 Chart</span>
                <span class="chevron" id="chartChevron">▼</span>
            </button>
            <div class="collapsible-body" id="chartSection" style="display:none;">
                <div class="chart-controls">
                    <select id="chartTypeSelect">
                        <option value="bar">Bar Chart</option>
                        <option value="line">Line Chart</option>
                        <option value="scatter">Scatter Plot</option>
                        <option value="radar">Radar Chart</option>
                    </select>
                    <select id="chartMetricSelect"><option value="">-- Y Axis --</option></select>
                    <select id="chartMetricX" style="display:none;"><option value="">-- X Axis --</option></select>
                    <input id="chartTitleInput" placeholder="Chart title" />
                    <input id="chartAxisYInput" placeholder="Y label" />
                    <input id="chartAxisXInput" placeholder="X label" />
                </div>
                <div class="chart-options">
                    <label><input type="checkbox" id="colorByTeamCheck" /> Color by Team</label>
                    <label><input type="checkbox" id="showLogosCheck" /> Team Logos</label>
                    <label><input type="checkbox" id="showPointLabels" /> Point Labels</label>
                    <label><input type="checkbox" id="showMeanY" /> Mean Y</label>
                    <label id="meanXLabel"><input type="checkbox" id="showMeanX" /> Mean X</label>
                    <label id="linRegLabel"><input type="checkbox" id="showLinReg" /> Lin. Reg.</label>
                    <label>Size:
                        <select id="chartSizeSelect">
                            <option value="small">S</option>
                            <option value="medium" selected>M</option>
                            <option value="large">L</option>
                        </select>
                    </label>
                    <button id="drawChartBtn" class="btn-sm">▶ Draw</button>
                </div>
                <div style="position:relative; margin-top:12px;">
                    <canvas id="statsChart" style="max-width:100%; background:#f9f9f9;"></canvas>
                </div>
            </div>
        </div>

        <!-- Table toolbar -->
        <div class="table-toolbar">
            <div class="toolbar-left">
                <button id="groupByPlayerBtn" class="btn-sm">👥 Group by Player</button>
                <button id="resetDataBtn" class="btn-sm btn-ghost">🔄 Raw Data</button>
                <label class="toolbar-label">Rows:
                    <select id="pageSizeSelect">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                        <option value="-1">All</option>
                    </select>
                </label>
            </div>
            <div class="toolbar-right">
                <button id="exportCsvBtn" class="btn-sm btn-ghost">📎 Export CSV</button>
            </div>
        </div>

        <!-- Table -->
        <div id="tableWrapper">
            <div id="table-container"></div>
        </div>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
